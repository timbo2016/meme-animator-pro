version: '3.8'

services:
  meme-animator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:./db/custom.db
    volumes:
      - ./db:/app/db
    restart: unless-stopped

  # Optional: Add a reverse proxy
